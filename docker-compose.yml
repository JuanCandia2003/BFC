version: '3.8'

services:
  web:
    image: php:8.2-apache
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html/
      - ./docker/apache-config.conf:/etc/apache2/sites-available/000-default.conf
    command: bash -c "docker-php-ext-install mysqli pdo_mysql && docker-php-ext-enable mysqli pdo_mysql && a2enmod rewrite && apache2-foreground"
    depends_on:
      - db

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=BFC
      - MYSQL_USER=usuario
      - MYSQL_PASSWORD=password
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=root
    depends_on:
      - db

volumes:
  db_data:
